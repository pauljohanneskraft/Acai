# Executable architecture contract for the UML repo (dogfooding).
#   uml check --source . --rules architecture.yml      # or: Scripts/audit.sh
#
# Encodes the intended design as a fitness function: hard invariants that must hold, plus budgets
# that flag responsibility bloat. Tighten budgets as debt is paid down so they ratchet against
# regression.

# Hard invariant: the module dependency graph must stay acyclic. (Type-level cycles: `uml cycles
# --scope types`.) Holds today — keep it that way.
cycles:
  scope: modules

budgets:
  # Per-type OO budgets — catch responsibility bloat / over-central hubs.
  - target: { kind: class }
    metric: weightedMethods
    max: 25
    message: "God class: too many methods — split responsibilities (SRP)."
  - metric: fanOut
    max: 25
    message: "Type depends on too many others — a responsibility-bloat / splitting candidate."
  - metric: fanIn
    max: 50
    message: "Over-central hub type — keep stable and well-tested; consider narrowing its surface."

  # Code-smell budgets (issue #101). Reported today via `uml metrics`; gating them through `uml check`
  # needs the budget resolver to learn these metric names — tracked in the check-expansion epic (#103),
  # so these stay commented examples until then.
  #  - metric: responseForClass      # RFC: methods + distinct call targets — high = costly to test.
  #    max: 40
  #    message: "Large response set — the type reacts to too much; consider splitting."
  #  - metric: mutablePublicState    # Publicly settable stored properties — encapsulation leak.
  #    max: 0
  #    message: "Publicly mutable state — expose read-only and narrow the setter."
  #  - metric: lackOfCohesion        # LCOM4 components among methods — high = unrelated jobs.
  #    max: 1
  #    message: "Low cohesion — the type's methods split into unrelated groups; consider extracting."
  #  - metric: featureEnvyMethods    # Methods more interested in another type than their own.
  #    max: 0
  #    message: "Feature envy — move the behaviour onto the type it keeps reaching into."

# NOTE on module `distance` from the main sequence (intentionally NOT gated):
# UMLCore (data model) and UMLDiagram (diagram models) sit near the "stable + concrete" corner, so
# their distance is high by design — a foundational data/model layer *should* be depended-upon and
# concrete; forcing abstraction in for the metric's sake would be over-engineering. Track distance
# informationally via `uml metrics`, but it is not an actionable budget for this codebase.
#
# Known accepted budget exceptions (essential complexity, not regressions):
#
# 1. The per-language tree-sitter extractors (Dart/JS/Java/Kotlin/Python/C-family) carry high
#    fan-out/method counts because each targets a distinct grammar. The genuinely shared logic is
#    already factored into composable, config-driven seams in `UMLTreeSitter` — `TreeSitterExtracting`
#    (traversal skeleton, artifact assembly, `recordSupertypeRelationships`, `normalizedAnnotation`,
#    referenced-type / parse-diagnostic collection), `CallSiteResolving` + `CallSiteScope` +
#    `MemberCallGrammar`, and `AssignmentResolving` + `LiteralNodeTypes`. What remains per language is
#    essential grammar-specific complexity: the six grammars diverge in node vocabulary *and* assembly
#    strategy (e.g. Java's `switch`-over-node-types type-reference builder vs Kotlin's name-part
#    assembly; node-type-keyed vs text-keyed modifier maps; keyword vs positional-label vs
#    naming-convention access levels). Forcing these through one shared member-extraction mold would be
#    over-engineering — a template-method base that each grammar only partially fits — so it is
#    deliberately not done (issue #91).
#
# 2. `DeclarationVisitor` (UMLSwift) is a `SwiftSyntax.SyntaxVisitor`: it must declare one
#    `visit`/`visitPost` override per syntax node kind it handles (~17 declaration/expression types),
#    and each override references that concrete node type — so fan-out and method count have a floor
#    set by the grammar surface, not by responsibility bloat. The separable logic *has* been carved
#    out into values it composes (`TypeDeclarationExtractor`, `MemberExtractor`,
#    `DeclarationSignatureExtractor`, `TypeReferenceExtractor`, `SourceLocationResolver`, and
#    `CallSiteCollector` for the body-level call-site/assignment/reference analysis); what remains is
#    the irreducible visitor dispatch surface.
#
# 3. `CodeArtifact` (UMLCore) has high fan-IN by design — it is the foundational data model every
#    layer reads. The remedy for a hub is stability + tests + a documented contract (see #88/#94),
#    not artificial fan-in reduction, which would only scatter the model. Keep it stable and small in
#    behaviour, not split.
