name: Build, Lint and Test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: build-lint-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: Build (iOS Simulator)
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Git to use HTTPS
        run: 'git config --global url."https://github.com/".insteadOf git@github.com:'

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml
        working-directory: App

      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -project Acai.xcodeproj \
            -scheme Acai-iOS \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO
        working-directory: App

  build-macos:
    name: Build (macOS)
    runs-on: macos-26
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Git to use HTTPS
        run: 'git config --global url."https://github.com/".insteadOf git@github.com:'

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build -v

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    container:
      image: swift:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Git to use HTTPS
        run: 'git config --global url."https://github.com/".insteadOf git@github.com:'

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build -v

  lint:
    name: SwiftLint
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/realm/swiftlint:0.57.1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run SwiftLint
        run: swiftlint lint --strict

  test-macos:
    name: Test (macOS)
    runs-on: macos-26
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Materialize LFS-tracked PNGs so the Examples/ image regression tests see real bytes.
          lfs: true

      - name: Configure Git to use HTTPS
        run: 'git config --global url."https://github.com/".insteadOf git@github.com:'

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test --parallel

      - name: Generate code coverage
        run: |
          swift test --enable-code-coverage
          xcrun llvm-cov export -format="lcov" \
            .build/debug/AcaiPackageTests.xctest/Contents/MacOS/AcaiPackageTests \
            -instr-profile .build/debug/codecov/default.profdata > coverage.lcov

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.lcov
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
        continue-on-error: true

  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    container:
      image: swift:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Git to use HTTPS
        run: 'git config --global url."https://github.com/".insteadOf git@github.com:'

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test --parallel
