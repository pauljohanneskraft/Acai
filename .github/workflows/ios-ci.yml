name: iOS CI

# Builds the iOS/iPadOS app via the XcodeGen-generated project in `App/`, targeting an iOS
# Simulator destination. This is the app's actual unit-test coverage (`AcaiAppTests`, part of the
# SwiftPM package) already runs via `swift test --parallel` on macOS in `build-lint-test.yml` — the
# `Acai-iOS` app target has no XCTest bundle of its own to run. What this job catches instead is iOS
# compile breakage: `AcaiApp` and its dependencies (Tree-sitter grammars, SwiftSyntax, …) build fine
# for macOS/Linux but must also build for an iOS destination, which only Xcode can verify.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (iOS Simulator)
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Git to use HTTPS
        run: 'git config --global url."https://github.com/".insteadOf git@github.com:'

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml
        working-directory: App

      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -project Acai.xcodeproj \
            -scheme Acai-iOS \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO
        working-directory: App
