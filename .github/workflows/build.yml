name: Build

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build.yml'
      - 'Package*'
      - 'Sources/**/*.swift'
  pull_request:
    paths:
      - '.github/workflows/build.yml'
      - 'Package*'
      - 'Sources/**/*.swift'

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS (Xcode 16.2)
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.2.app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build -v

  linux:
    name: Linux (Swift 6.1)
    runs-on: ubuntu-latest
    container:
      image: swift:6.1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build -v
