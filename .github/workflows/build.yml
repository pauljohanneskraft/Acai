name: Build

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build.yml'
      - 'Package*'
      - 'Sources/**/*.swift'
  pull_request:
    paths:
      - '.github/workflows/build.yml'
      - 'Package*'
      - 'Sources/**/*.swift'

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS (latest Xcode)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build -v

  linux:
    name: Linux (latest Swift)
    runs-on: ubuntu-latest
    container:
      image: swift:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build -v
